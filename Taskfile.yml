version: '3'

tasks:
  default:
    cmds:
      - task: dev

  dev:
    desc: Run wails dev with xvfb
    cmds:
      - xvfb-run -a wails dev -devserver localhost:34117

  build:
    desc: Build the application for the current platform
    cmds:
      - wails build

  build:windows:
    desc: Build the Windows installer (AMD64)
    cmds:
      - wails build -platform windows/amd64 -nsis

  install:
    desc: Install backend and frontend dependencies
    cmds:
      - go mod tidy
      - cd frontend && npm install

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy
