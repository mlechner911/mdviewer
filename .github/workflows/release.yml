name: Wails Release Build

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'linux/amd64'
            os: 'ubuntu-22.04'
            build-cmd: 'wails build -platform linux/amd64'
            artifact-name: 'linux-amd64'
          - platform: 'windows/amd64'
            os: 'windows-latest'
            build-cmd: 'wails build -platform windows/amd64 -nsis'
            artifact-name: 'windows-amd64'
          - platform: 'darwin/arm64'
            os: 'macos-latest'
            build-cmd: 'wails build -platform darwin/arm64'
            artifact-name: 'macos-arm64'

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install NSIS (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          choco install nsis -y
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if (!(Test-Path $nsisPath)) {
            $nsisPath = "C:\Program Files\NSIS"
          }
          echo "$nsisPath" >> $env:GITHUB_PATH
          # Verify using full path if needed
          & "$nsisPath\makensis.exe" /VERSION

      - name: Build App
        run: ${{ matrix.build-cmd }}

      - name: Debug - List Build Files
        shell: bash
        run: ls -R build/bin/

      - name: Prepare Linux Artifact
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mv build/bin/md-viewer build/bin/md-viewer-linux-amd64
          chmod +x build/bin/md-viewer-linux-amd64

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        run: |
          cd build/bin
          zip -r md-viewer-macos-arm64.zip md-viewer.app

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: md-viewer-${{ matrix.artifact-name }}
          path: build/bin/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/md-viewer-linux-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
