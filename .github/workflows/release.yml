name: Wails Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      matrix:
        include:
          - platform: 'linux/amd64'
            os: 'ubuntu-latest'
          - platform: 'windows/amd64'
            os: 'windows-latest'
          - platform: 'darwin/universal'
            os: 'macos-latest'

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Wails App
        uses: dAppServer/wails-build-action@v2
        with:
          build-name: md-viewer
          build-platform: ${{ matrix.platform }}
          package: true
          go-version: '1.21'
          node-version: '18'
          github-token: ${{ secrets.GITHUB_TOKEN }}
