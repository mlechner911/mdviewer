name: Wails Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'linux/amd64'
            os: 'ubuntu-latest'
            build-cmd: 'wails build -platform linux/amd64'
            artifact-path: 'build/bin/md-viewer'
          - platform: 'windows/amd64'
            os: 'windows-latest'
            build-cmd: 'wails build -platform windows/amd64 -nsis'
            artifact-path: 'build/bin/md-viewer-installer.exe'
          - platform: 'darwin/universal'
            os: 'macos-latest'
            build-cmd: 'wails build -platform darwin/universal'
            artifact-path: 'build/bin/md-viewer.app'

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build App
        run: ${{ matrix.build-cmd }}

      - name: Compress macOS App
        if: matrix.os == 'macos-latest'
        run: |
          cd build/bin
          zip -r md-viewer-mac.zip md-viewer.app

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: md-viewer-${{ matrix.platform }}
          path: |
            ${{ matrix.artifact-path }}
            build/bin/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.exe
            **/*.zip
            **/md-viewer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
