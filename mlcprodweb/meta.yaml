id: "marksafe"
name: "MarkSafe"
version: "1.2.4"
status: "stable"
category: "Development Tools"
license: "MIT"
platforms: ["Windows", "Linux", "macOS"]
github: "https://github.com/mlechner911/mdviewer"
screenshots:
  - "macos_preview.svg"
  - "windows_preview.svg"
slogan_en: "A fast, private Markdown editor and viewer for your desktop. GFM, KaTeX math, Mermaid diagrams — no cloud required."
slogan_de: "Schneller, privater Markdown-Editor für den Desktop. GFM, KaTeX-Formeln, Mermaid-Diagramme – keine Cloud nötig."
downloads:
  windows: "https://github.com/mlechner911/mdviewer/releases/latest/download/mdviewer.exe"
  linux: "https://github.com/mlechner911/mdviewer/releases/latest/download/mdviewer-linux"
  macos: ""
features:
  - icon: "edit-3"
    title_en: "Edit & Preview"
    title_de: "Editieren & Vorschau"
    desc_en: "Write Markdown with a simple editor and see changes instantly in the rich preview."
    desc_de: "Schreiben Sie Markdown in einem einfachen Editor und sehen Sie Änderungen sofort in der Live-Vorschau."
  - icon: "layout"
    title_en: "Multi-Tab Interface"
    title_de: "Multi-Tab Oberfläche"
    desc_en: "Work with multiple documents simultaneously without cluttering your desktop."
    desc_de: "Arbeiten Sie an mehreren Dokumenten gleichzeitig, ohne Ihren Desktop zu überladen."
  - icon: "check-square"
    title_en: "Full GFM Support"
    title_de: "Volle GFM Unterstützung"
    desc_en: "GitHub Flavored Markdown support including tables, tasklists, and footnotes."
    desc_de: "Unterstützung für GitHub Flavored Markdown inklusive Tabellen, Tasklisten und Fußnoten."
  - icon: "alert-circle"
    title_en: "GitHub-style Alerts"
    title_de: "GitHub-style Alerts"
    desc_en: "High-visibility notes, tips, and warnings using the standard [!NOTE] syntax."
    desc_de: "Gut sichtbare Notizen und Warnungen mit der standardmäßigen [!NOTE]-Syntax."
  - icon: "sigma"
    title_en: "Math with KaTeX"
    title_de: "Mathematik mit KaTeX"
    desc_en: "Render complex mathematical expressions and scientific notation with ease."
    desc_de: "Stellen Sie komplexe mathematische Formeln und wissenschaftliche Notationen mühelos dar."
  - icon: "git-merge"
    title_en: "Mermaid.js Diagrams"
    title_de: "Mermaid.js Diagramme"
    desc_en: "Native support for flowcharts, sequences, and Gantt diagrams directly in Markdown."
    desc_de: "Native Unterstützung für Flussdiagramme, Sequenzen und Gantt-Diagramme direkt in Markdown."
